    * { box-sizing: border-box; }

      margin: 0;

      transition: background 0.3s, color 0.3s;
    }

    header {
      background: #ffffff;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.08);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo-text {
      font-size: 22px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .search-box,
    .category-select {
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
      background: #fff;
      transition: background 0.3s, color 0.3s, border-color 0.3s;
    }

    .search-box { width: 200px; }

    .dark-btn {
      padding: 8px 12px;
      border-radius: 8px;
      border: none;
      background: #333;
      color: #fff;
      cursor: pointer;
      transition: background 0.3s;
    }

    .dark-btn:hover {
      background: #444;
    }

    main {
      max-width: 1200px;
      margin: 20px auto;
      padding: 0 16px 40px;
    }

    #player-section {
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 24px;
      position: relative;
    }

    #player-header {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 13px;
      z-index: 2;
    }

    #loader {
      width: 40px;
      height: 40px;
      border: 4px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: spin 1s linear infinite;
      display: none;
      z-index: 2;
    }

    #gameFrame {
      width: 100%;
      height: 520px;
      border: none;
      display: block;
      transition: opacity 0.3s;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 16px;
      animation: fadeIn 0.4s ease;
    }

    .card {
      background: #ffffff;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      box-shadow: 0 2px 5px rgba(0,0,0,0.08);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-6px) scale(1.03);
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    .card img {
      width: 100%;
      height: 120px;
      object-fit: cover;
    }

    .card-body {
      padding: 8px 10px;
    }

    .card-title {
      font-size: 14px;
      font-weight: bold;
    }

    .card-tags {
      font-size: 11px;
      color: #777;
      margin-top: 2px;
    }

    @keyframes spin {
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    body.dark {
      background: #111;
      color: #eee;
    }

    body.dark header {
      background: #222;
      box-shadow: 0 2px 5px rgba(0,0,0,0.6);
    }

    body.dark .card {
      background: #222;
      color: #eee;
    }

    body.dark .search-box,
    body.dark .category-select {
      background: #333;
      color: #eee;
      border-color: #555;
    }

    @media (max-width: 600px) {
      .search-box,
      .category-select {
        width: 100%;
      }
      .grid {
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      }
      #gameFrame { height: 360px; }
    }
  </style>
</head>

<body>

<header>
  <div class="logo-text">📖 let’s study</div>

  <div class="controls">
    <input id="searchInput" type="text" placeholder="Search games..." class="search-box">
    <select id="categorySelect" class="category-select">
      <option value="All">All Categories</option>
    </select>
    <button id="darkToggle" class="dark-btn">🌙</button>
  </div>
</header>

<main>
  <section id="player-section">
    <div id="player-header">Select a game to start playing</div>
    <div id="loader"></div>
    <iframe id="gameFrame" src=""></iframe>
  </section>

  <h2>All Games</h2>
  <div class="grid" id="gameGrid"></div>

<script>

// Load game into iframe
function play(url) {
  const frame = document.getElementById("gameFrame");
  const loader = document.getElementById("loader");
  const header = document.getElementById("player-header");

  loader.style.display = "block";
  frame.style.opacity = "0.3";
  header.textContent = "Loading...";

  frame.src = url;

  frame.onload = () => {
    loader.style.display = "none";
    frame.style.opacity = "1";
    header.textContent = "Now Playing";
  };
}

// Build game cards dynamically
function renderGames(list) {
  const grid = document.getElementById("gameGrid");
  grid.innerHTML = "";

  list.forEach(game => {
    const card = document.createElement("div");
    card.className = "card";
    card.onclick = () => play(game.url);

    if (game.thumb) {
      const img = document.createElement("img");
      img.src = game.thumb;
      card.appendChild(img);
    }

    const body = document.createElement("div");
    body.className = "card-body";

    const title = document.createElement("div");
    title.className = "card-title";
    title.textContent = game.title;

    const tags = document.createElement("div");
    tags.className = "card-tags";
    tags.textContent = game.category || "";

    body.appendChild(title);
    body.appendChild(tags);
    card.appendChild(body);

    grid.appendChild(card);
  });
}

// Search + category filter
function applyFilters() {
  const search = document.getElementById("searchInput").value.toLowerCase();
  const category = document.getElementById("categorySelect").value;

  const filtered = games.filter(g =>
    (category === "All" || g.category === category) &&
    g.title.toLowerCase().includes(search)
  );

  renderGames(filtered);
}

// Dark mode toggle
document.getElementById("darkToggle").onclick = () => {
  document.body.classList.toggle("dark");
};

// Search + category listeners
document.getElementById("searchInput").oninput = applyFilters;
document.getElementById("categorySelect").onchange = applyFilters;
